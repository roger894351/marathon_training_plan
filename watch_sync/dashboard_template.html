<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d2e;
    --border: #2a2d3e;
    --text: #e0e0e0;
    --text-dim: #8a8d9e;
    --accent: #4fc3f7;
    --green: #66bb6a;
    --orange: #ffa726;
    --red: #ef5350;
    --purple: #ab47bc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    line-height: 1.5;
  }
  h1 { font-size: 1.8rem; margin-bottom: 8px; }
  .subtitle { color: var(--text-dim); margin-bottom: 24px; font-size: 0.9rem; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
    gap: 20px;
    margin-bottom: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .card h2 { font-size: 1.1rem; margin-bottom: 12px; color: var(--accent); }
  .card canvas { width: 100% !important; }
  .latest-run { grid-column: 1 / -1; }
  .latest-run .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }
  .stat {
    background: var(--bg);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .stat .value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .stat .label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; }
  .zone-bar {
    display: flex;
    height: 24px;
    border-radius: 6px;
    overflow: hidden;
    margin-top: 8px;
  }
  .zone-bar span {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    color: #fff;
  }
  .zone-E { background: var(--green); }
  .zone-M { background: #26a69a; }
  .zone-T { background: var(--orange); }
  .zone-I { background: var(--red); }
  .zone-R { background: var(--purple); }
  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<h1>Running Dashboard</h1>
<p class="subtitle">Generated: __GENERATED_AT__ | Activities: __ACTIVITY_COUNT__ | Last sync: __LAST_SYNC__</p>

<script>
// Data injected by dashboard.py
const DATA = __DATA_JSON__;

// ---- Helpers ----
function formatPace(secPerKm) {
  if (!secPerKm || secPerKm <= 0) return '—';
  const m = Math.floor(secPerKm / 60);
  const s = Math.round(secPerKm % 60);
  return m + ':' + String(s).padStart(2, '0') + '/km';
}

function formatDuration(sec) {
  if (!sec) return '—';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return h > 0 ? h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0')
               : m + ':' + String(s).padStart(2, '0');
}

function weekKey(dateStr) {
  const d = new Date(dateStr);
  // ISO week: Monday-based
  const day = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - day);
  const yearStart = new Date(d.getFullYear(), 0, 1);
  const weekNo = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
  return d.getFullYear() + '-W' + String(weekNo).padStart(2, '0');
}

const activities = (DATA.activities || []).filter(a => a.distance_km > 0);
const wellness = DATA.wellness || [];

// ---- Chart.js defaults ----
Chart.defaults.color = '#8a8d9e';
Chart.defaults.borderColor = '#2a2d3e';
Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, sans-serif';

if (activities.length === 0) {
  document.querySelector('.subtitle').insertAdjacentHTML('afterend',
    '<div class="empty-state"><p>No activities found. Run <code>python3 -m watch_sync sync</code> first.</p></div>');
} else {

// ---- 1. Weekly Volume ----
const weeklyData = {};
activities.forEach(a => {
  const wk = weekKey(a.date);
  if (!weeklyData[wk]) weeklyData[wk] = { km: 0, count: 0 };
  weeklyData[wk].km += a.distance_km;
  weeklyData[wk].count += 1;
});
const weekLabels = Object.keys(weeklyData).sort();
const weekKm = weekLabels.map(w => Math.round(weeklyData[w].km * 10) / 10);

const weeklyCtx = document.getElementById('weeklyVolume');
if (weeklyCtx) {
  new Chart(weeklyCtx, {
    type: 'bar',
    data: {
      labels: weekLabels,
      datasets: [{
        label: 'Weekly km',
        data: weekKm,
        backgroundColor: '#4fc3f7',
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, title: { display: true, text: 'km' } }
      }
    }
  });
}

// ---- 2. Cardiac Efficiency Trend ----
const effData = activities
  .filter(a => a.efficiency_factor)
  .map(a => ({ x: a.date, y: a.efficiency_factor }));

const effCtx = document.getElementById('efficiencyTrend');
if (effCtx && effData.length > 0) {
  new Chart(effCtx, {
    type: 'line',
    data: {
      datasets: [{
        label: 'Pace/HR (lower = more efficient)',
        data: effData,
        borderColor: '#66bb6a',
        backgroundColor: 'rgba(102,187,106,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 3,
      }]
    },
    options: {
      responsive: true,
      scales: {
        x: { type: 'category', labels: effData.map(d => d.x) },
        y: { title: { display: true, text: 'sec/km per bpm' } }
      }
    }
  });
}

// ---- 3. Zone Distribution per week ----
const weekZones = {};
activities.forEach(a => {
  const wk = weekKey(a.date);
  if (!weekZones[wk]) weekZones[wk] = { E: 0, M: 0, T: 0, I: 0, R: 0 };
  const pz = a.pace_zones || {};
  const dur = a.duration_sec || 0;
  Object.keys(pz).forEach(z => {
    if (weekZones[wk][z] !== undefined) {
      weekZones[wk][z] += dur * (pz[z] / 100);
    }
  });
});
const zoneWeeks = Object.keys(weekZones).sort();
const zoneColors = { E: '#66bb6a', M: '#26a69a', T: '#ffa726', I: '#ef5350', R: '#ab47bc' };
const zoneDatasets = ['E', 'M', 'T', 'I', 'R'].map(z => {
  const data = zoneWeeks.map(wk => {
    const total = Object.values(weekZones[wk]).reduce((s, v) => s + v, 0);
    return total > 0 ? Math.round(weekZones[wk][z] / total * 1000) / 10 : 0;
  });
  return { label: z, data, backgroundColor: zoneColors[z] };
});

const zoneCtx = document.getElementById('zoneDistribution');
if (zoneCtx && zoneWeeks.length > 0) {
  new Chart(zoneCtx, {
    type: 'bar',
    data: { labels: zoneWeeks, datasets: zoneDatasets },
    options: {
      responsive: true,
      scales: {
        x: { stacked: true },
        y: { stacked: true, beginAtZero: true, max: 100, title: { display: true, text: '%' } }
      }
    }
  });
}

// ---- 4. Fitness & Fatigue (CTL/ATL) ----
const fitData = [];
const fatData = [];
// Prefer wellness CTL/ATL, fall back to per-activity
wellness.filter(w => w.ctl || w.atl).forEach(w => {
  if (w.ctl) fitData.push({ x: w.date, y: w.ctl });
  if (w.atl) fatData.push({ x: w.date, y: w.atl });
});
if (fitData.length === 0) {
  activities.filter(a => a.icu_ctl).forEach(a => {
    fitData.push({ x: a.date, y: a.icu_ctl });
    if (a.icu_atl) fatData.push({ x: a.date, y: a.icu_atl });
  });
}

const fitCtx = document.getElementById('fitnessFatigue');
if (fitCtx && fitData.length > 0) {
  const allLabels = [...new Set([...fitData.map(d => d.x), ...fatData.map(d => d.x)])].sort();
  new Chart(fitCtx, {
    type: 'line',
    data: {
      datasets: [
        {
          label: 'Fitness (CTL)',
          data: fitData,
          borderColor: '#4fc3f7',
          backgroundColor: 'rgba(79,195,247,0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 1,
        },
        {
          label: 'Fatigue (ATL)',
          data: fatData,
          borderColor: '#ef5350',
          backgroundColor: 'rgba(239,83,80,0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 1,
        }
      ]
    },
    options: {
      responsive: true,
      scales: {
        x: { type: 'category', labels: allLabels },
        y: { title: { display: true, text: 'Training Load' } }
      }
    }
  });
}

// ---- 5. Latest Run Card ----
const latest = activities[activities.length - 1];
if (latest) {
  const card = document.getElementById('latestRun');
  if (card) {
    card.querySelector('.run-title').textContent =
      (latest.name || latest.sport || 'Run') + ' — ' + latest.date;
    card.querySelector('.stats').innerHTML = [
      { label: 'Distance', value: latest.distance_km.toFixed(1) + ' km' },
      { label: 'Duration', value: formatDuration(latest.duration_sec) },
      { label: 'Avg Pace', value: formatPace(latest.avg_pace_sec_km) },
      { label: 'Avg HR', value: latest.avg_hr ? latest.avg_hr + ' bpm' : '—' },
      { label: 'Cadence', value: latest.avg_cadence ? latest.avg_cadence + ' spm' : '—' },
      { label: 'Training Load', value: latest.icu_training_load || '—' },
      { label: 'VDOT', value: latest.estimated_vdot || '—' },
      { label: 'Efficiency', value: latest.efficiency_factor || '—' },
    ].map(s => `<div class="stat"><div class="value">${s.value}</div><div class="label">${s.label}</div></div>`).join('');

    // Zone bar
    const pz = latest.pace_zones || {};
    const hasZones = Object.values(pz).some(v => v > 0);
    if (hasZones) {
      card.querySelector('.zone-bar').innerHTML = ['E','M','T','I','R']
        .filter(z => pz[z] > 2)
        .map(z => `<span class="zone-${z}" style="width:${pz[z]}%">${z} ${pz[z]}%</span>`)
        .join('');
    }
  }
}

} // end if activities.length > 0
</script>

<div class="grid">
  <div class="card">
    <h2>Weekly Volume</h2>
    <canvas id="weeklyVolume" height="200"></canvas>
  </div>
  <div class="card">
    <h2>Cardiac Efficiency Trend</h2>
    <canvas id="efficiencyTrend" height="200"></canvas>
  </div>
  <div class="card">
    <h2>Zone Distribution</h2>
    <canvas id="zoneDistribution" height="200"></canvas>
  </div>
  <div class="card">
    <h2>Fitness & Fatigue</h2>
    <canvas id="fitnessFatigue" height="200"></canvas>
  </div>
  <div class="card latest-run" id="latestRun">
    <h2>Latest Run: <span class="run-title"></span></h2>
    <div class="zone-bar"></div>
    <div class="stats"></div>
  </div>
</div>

</body>
</html>
